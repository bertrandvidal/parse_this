name: parse_this publish package to pypi

on:
  push:
    branches:
      - main
      - v*
    paths:
      - setup.py
      - .github/workflows/publish-package-to-pypi.yml

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed for pypi trusted publishing
    steps:
        - uses: actions/checkout@v6
        - name: set up Python
          uses: actions/setup-python@v6
          with:
            python-version: "3.x"
        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install build --user
        - name: build package
          run: python -m build
        - name: upload build artifacts
          uses: actions/upload-artifact@v5
          with:
            name: python-package-distributions
            path: dist/
        - name: extract version
          env:
            GITHUB_TOKEN: ${{ secrets.CI_CD_TAGGING_TOKEN }} # need to push tag to main
          run: |
            pip install setuptools
            VERSION=$(python setup.py --version)
            echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Extracted version: $VERSION"
        - name: create tag
          run: |
            # tag the commit on top of which the PR is merged
            git tag v${PACKAGE_VERSION} ${{ github.event.pull_request.base.ref }}
            git push origin v${PACKAGE_VERSION}
        - name: create github release
          run: gh release create --fail-on-no-commits v${PACKAGE_VERSION} dist/
        - name: publish package
          uses: pypa/gh-action-pypi-publish@v1.13.0
