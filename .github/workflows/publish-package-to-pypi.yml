name: parse_this publish package to pypi

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed for pypi trusted publishing
      contents: write # needed to create tag
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
        - uses: actions/checkout@v6
        - name: set up Python
          uses: actions/setup-python@v6
          with:
            python-version: "3.x"
        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install build --user
        - name: build package
          run: python -m build
        - name: upload build artifacts
          uses: actions/upload-artifact@v7
          with:
            name: python-package-distributions
            path: dist/
        - name: extract version
          run: |
            VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Extracted version: $VERSION"
        - name: create tag
          run: |
            # tag the commit on top of which the PR is merged
            git tag v${PACKAGE_VERSION} ${{ github.event.pull_request.base.ref }}
            git push origin v${PACKAGE_VERSION}
        - name: create github release
          run: gh release create --fail-on-no-commits v${PACKAGE_VERSION} dist/parse_this*.tar.gz
        - name: publish package
          uses: pypa/gh-action-pypi-publish@v1.13.0
