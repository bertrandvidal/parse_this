name: parse_this pre-submit queues

on:
  pull_request:
    branches:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - python-version: "3.14"
            allow-failure: true
    continue-on-error: ${{ matrix.allow-failure || false }}

    steps:
    - uses: actions/checkout@v6
    - name: set up python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: ruff lint
      run: ruff check parse_this test
    - name: ruff format
      run: ruff format --check parse_this test
    - name: type checking
      run: |
        mypy parse_this test
    - name: test with pytest
      run: |
        pytest --cache-clear --cov-report=xml test/
    - name: add coverage as PR comment
      uses: orgoro/coverage@v3.2
      with:
        coverageFile: coverage.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        thresholdAll: 0.99
        thresholdNew: 0.99
        thresholdModified: 0.99
